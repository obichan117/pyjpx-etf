name: Publish to PyPI

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if version changed
        id: check
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if this version already exists on PyPI
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/pyjpx-etf/$VERSION/json")
          if [ "$STATUS" = "404" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not on PyPI — will publish"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already on PyPI — skipping"
          fi

  publish:
    runs-on: ubuntu-latest
    needs: [ci, check-version]
    if: needs.check-version.outputs.should_publish == 'true'
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
